name: Biweekly State 2026 Scrape + Aggregate

on:
  schedule:
    - cron: '0 6 * * 1/2'  # Every other Monday at 6am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-and-aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr", "tidyverse", "purrr", "writexl", "stringr"), repos="https://cloud.r-project.org")'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Scrape state 2026 data
        run: python scrapers/state_2026_scraper.py

      - name: Run R aggregation scripts
        run: |
          Rscript scripts/clean_state_data.R
          Rscript scripts/clean_federal_data.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state_2026/transactions.csv viz/data/clean/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Biweekly update: scrape + aggregate $(date +%Y-%m-%d)"
            git push
          fi
