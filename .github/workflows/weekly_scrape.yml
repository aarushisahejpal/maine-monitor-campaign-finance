name: Daily Scrape + Aggregate

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 6am ET (10am UTC)
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-and-aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr", "tidyverse", "purrr", "writexl", "stringr"), repos="https://cloud.r-project.org")'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── STATE DATA ──
      - name: State data update (incremental)
        run: python scrapers/state_daily_update.py

      - name: Check for terminated candidates
        run: python scrapers/check_terminated.py

      # ── FEC DATA ──
      - name: Scrape FEC receipts
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python scrapers/fec_scraper.py 2026 a
        continue-on-error: true

      - name: Scrape FEC expenditures
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python scrapers/fec_scraper.py 2026 b
        continue-on-error: true

      - name: Pull official FEC totals + by-source
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          python3 -c "
          import requests, csv, json, time, os
          API_KEY = os.environ.get('FEC_API_KEY', 'DEMO_KEY')
          with open('scrapers/me_candidates_2026.json') as f:
              cands = json.load(f)

          official = []
          exp = []
          by_source = []

          for c in cands:
              comm_id = c['committee_id']
              if comm_id == 'NONE': continue
              try:
                  resp = requests.get(f'https://api.open.fec.gov/v1/committee/{comm_id}/totals/', params={'api_key': API_KEY, 'cycle': 2026}, timeout=60)
                  results = resp.json().get('results', [])
                  if results:
                      t = results[0]
                      # Official totals
                      official.append({'candidate_name': c['name'], 'office': c['office'], 'district': c['district'], 'party': c['party'], 'tot_con': t.get('receipts', 0) or 0, 'individual_unitemized': t.get('individual_unitemized_contributions', 0) or 0, 'cash_on_hand': t.get('last_cash_on_hand_end_period', 0) or 0})
                      # Official expenditures
                      exp.append({'candidate_name': c['name'], 'office': c['office'], 'district': c['district'], 'party': c['party'], 'tot_exp': t.get('disbursements', 0) or 0})
                      # By-source breakdown
                      individual = (t.get('individual_itemized_contributions', 0) or 0) + (t.get('individual_unitemized_contributions', 0) or 0)
                      pac = t.get('other_political_committee_contributions', 0) or 0
                      party_c = t.get('political_party_committee_contributions', 0) or 0
                      cand_self = t.get('candidate_contribution', 0) or 0
                      transfers = t.get('transfers_from_other_authorized_committee', 0) or 0
                      loans = t.get('all_loans_received', 0) or t.get('loans', 0) or 0
                      offsets = t.get('offsets_to_operating_expenditures', 0) or 0
                      other_r = t.get('other_receipts', 0) or 0
                      o, d = c['office'], c['district']
                      if individual: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Individual', 'total': round(individual, 2)})
                      if pac: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'PAC/Committee', 'total': round(pac, 2)})
                      if party_c: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Party Committee', 'total': round(party_c, 2)})
                      if cand_self: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Candidate/Self', 'total': round(cand_self, 2)})
                      if transfers: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Transfers (Own Committees)', 'total': round(transfers, 2)})
                      if loans: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Loans', 'total': round(loans, 2)})
                      if offsets + other_r > 0: by_source.append({'candidate_name': c['name'], 'office': o, 'district': d, 'source_type': 'Other', 'total': round(offsets + other_r, 2)})
                  time.sleep(0.5)
              except Exception as e:
                  print(f'Error for {c[\"name\"]}: {e}')

          # Write totals
          with open('viz/data/clean/total_contributions_by_federal_candidate.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=['candidate_name','office','district','party','tot_con','individual_unitemized','cash_on_hand'])
              w.writeheader()
              w.writerows(sorted(official, key=lambda x: (x['office'], x['district'], -x['tot_con'])))

          # Write expenditures
          with open('viz/data/clean/total_expenditures_by_federal_candidate.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=['candidate_name','office','district','party','tot_exp'])
              w.writeheader()
              w.writerows(sorted(exp, key=lambda x: (x['office'], x['district'], -x['tot_exp'])))

          # Write by-source
          with open('viz/data/clean/contributions_by_source_federal.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=['candidate_name','office','district','source_type','total'])
              w.writeheader()
              w.writerows(by_source)

          print(f'Updated {len(official)} contribution totals, {len(exp)} expenditure totals, {len(by_source)} by-source rows')
          "

      # ── VERIFY ──
      - name: Verify data completeness
        run: |
          python3 -c "
          import csv
          with open('data/state_2026/transactions.csv') as f:
              state_rows = list(csv.DictReader(f))
          urls = [r['filer_url'] for r in state_rows if r['filer_url']]
          state_dupes = len(urls) - len(set(urls))
          print(f'State: {len(state_rows):,} rows, {state_dupes} duplicates')
          assert state_dupes == 0, 'State data has duplicates!'

          with open('data/federal_2026/receipts.csv') as f:
              fed_rows = list(csv.DictReader(f))
          txn_ids = [r['transaction_id'] for r in fed_rows if r.get('transaction_id')]
          fed_dupes = len(txn_ids) - len(set(txn_ids))
          print(f'Federal receipts: {len(fed_rows):,} rows, {fed_dupes} duplicates')
          assert fed_dupes == 0, 'Federal receipts have duplicates!'

          with open('data/federal_2026/expenditures.csv') as f:
              exp_rows = list(csv.DictReader(f))
          exp_ids = [r['transaction_id'] for r in exp_rows if r.get('transaction_id')]
          exp_dupes = len(exp_ids) - len(set(exp_ids))
          print(f'Federal expenditures: {len(exp_rows):,} rows, {exp_dupes} duplicates')
          assert exp_dupes == 0, 'Federal expenditures have duplicates!'

          print('All data verification passed')
          "

      # ── AGGREGATE ──
      - name: Run R aggregation scripts
        run: |
          Rscript scripts/clean_state_data.R
          Rscript scripts/clean_federal_data.R

      # ── UPDATE + PUSH ──
      - name: Update footer dates
        run: |
          DATE=$(date +"%B %-d, %Y")
          for f in viz/governor.html viz/senate.html viz/house.html viz/statehouse.html; do
            sed -i "s/Last updated:.*/Last updated:<\/strong> $DATE. Data is refreshed daily./" "$f" 2>/dev/null || true
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ viz/data/clean/ viz/*.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: $(date +%Y-%m-%d)"
            git push
          fi
