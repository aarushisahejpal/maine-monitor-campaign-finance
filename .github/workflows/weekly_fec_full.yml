name: Weekly FEC Update

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 8am ET (12pm UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  # Job 1: All committees except Wood (fast — under 1 hour)
  fec-scrape-main:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull receipts (excluding Wood)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          FEC_SKIP_COMMITTEES: C00903179
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling receipts from $MIN_DATE (skipping Wood)"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 a

      - name: Pull expenditures (excluding Wood)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          FEC_SKIP_COMMITTEES: C00903179
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling expenditures from $MIN_DATE (skipping Wood)"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 b

      - name: Verify no data loss
        run: |
          python3 -c "
          import csv
          for fname, id_field, min_expected in [
              ('data/federal_2026/receipts.csv', 'transaction_id', 147000),
              ('data/federal_2026/expenditures.csv', 'transaction_id', 5000)
          ]:
              with open(fname) as f:
                  ids = [r[id_field] for r in csv.DictReader(f) if r.get(id_field)]
              dupes = len(ids) - len(set(ids))
              print(f'{fname}: {len(ids):,} records, {dupes} duplicates')
              assert dupes == 0, f'{fname} has duplicates!'
              assert len(ids) >= min_expected, f'{fname} has only {len(ids):,} records — expected at least {min_expected:,}. Aborting.'
          print('All clean')
          "

      - name: Push raw FEC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/federal_2026/
          if git diff --staged --quiet; then
            echo "No new FEC records"
          else
            git commit -m "Weekly FEC update (29 committees): $(date +%Y-%m-%d)"
            git push
          fi

  # Job 2: Wood only (58K+ records, needs dedicated time)
  fec-scrape-wood:
    needs: fec-scrape-main
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull Wood receipts only
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          FEC_ONLY_COMMITTEES: C00903179
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling Wood receipts from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 a

      - name: Pull Wood expenditures only
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          FEC_ONLY_COMMITTEES: C00903179
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling Wood expenditures from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 b

      - name: Verify no data loss
        run: |
          python3 -c "
          import csv
          for fname, id_field, min_expected in [
              ('data/federal_2026/receipts.csv', 'transaction_id', 147000),
              ('data/federal_2026/expenditures.csv', 'transaction_id', 5000)
          ]:
              with open(fname) as f:
                  ids = [r[id_field] for r in csv.DictReader(f) if r.get(id_field)]
              dupes = len(ids) - len(set(ids))
              print(f'{fname}: {len(ids):,} records, {dupes} duplicates')
              assert dupes == 0, f'{fname} has duplicates!'
              assert len(ids) >= min_expected, f'{fname} has only {len(ids):,} records — expected at least {min_expected:,}. Aborting.'
          print('All clean')
          "

      - name: Push raw FEC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/federal_2026/
          if git diff --staged --quiet; then
            echo "No new Wood records"
          else
            git commit -m "Weekly FEC update (Wood): $(date +%Y-%m-%d)"
            git push
          fi
