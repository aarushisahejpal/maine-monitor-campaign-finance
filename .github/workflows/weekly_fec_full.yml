name: Weekly FEC Update

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 8am ET (12pm UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fec-update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies for R
        run: sudo apt-get update && sudo apt-get install -y libuv1-dev libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e '.libPaths(); install.packages(c("tidyverse", "readr", "purrr", "writexl", "stringr"), lib=.libPaths()[1], repos="https://cloud.r-project.org", dependencies=TRUE); library(tidyverse)'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── INCREMENTAL FEC SCAN (last 30 days only) ──
      - name: Pull recent FEC receipts
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          FEC_MIN_DATE: ${{ env.MIN_DATE }}
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling receipts from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 a

      - name: Pull recent FEC expenditures
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling expenditures from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 b

      # ── VERIFY ──
      - name: Verify no duplicates
        run: |
          python3 -c "
          import csv
          for fname, id_field in [('data/federal_2026/receipts.csv', 'transaction_id'), ('data/federal_2026/expenditures.csv', 'transaction_id')]:
              with open(fname) as f:
                  ids = [r[id_field] for r in csv.DictReader(f) if r.get(id_field)]
              dupes = len(ids) - len(set(ids))
              print(f'{fname}: {len(ids):,} records, {dupes} duplicates')
              assert dupes == 0, f'{fname} has duplicates!'
          print('All clean')
          "

      # ── AGGREGATE ──
      - name: Run R aggregation
        run: |
          Rscript scripts/clean_federal_data.R

      # ── PUSH ──
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/federal_2026/ viz/data/clean/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly FEC update: $(date +%Y-%m-%d)"
            git push
          fi
