name: Weekly FEC Update

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 8am ET (12pm UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fec-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── INCREMENTAL FEC SCAN (last 30 days only) ──
      # Appends new records to existing data, deduplicates by transaction_id.
      # The daily pipeline's R aggregation will pick up new records next morning.
      # This workflow ONLY touches data/federal_2026/ — never clean CSVs or HTML.
      - name: Pull recent FEC receipts
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling receipts from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 a
        continue-on-error: true

      - name: Pull recent FEC expenditures
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          MIN_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          echo "Pulling expenditures from $MIN_DATE"
          FEC_MIN_DATE=$MIN_DATE python scrapers/fec_scraper.py 2026 b
        continue-on-error: true

      # ── VERIFY ──
      - name: Verify no data loss
        run: |
          python3 -c "
          import csv
          for fname, id_field, min_expected in [
              ('data/federal_2026/receipts.csv', 'transaction_id', 147000),
              ('data/federal_2026/expenditures.csv', 'transaction_id', 5000)
          ]:
              with open(fname) as f:
                  ids = [r[id_field] for r in csv.DictReader(f) if r.get(id_field)]
              dupes = len(ids) - len(set(ids))
              print(f'{fname}: {len(ids):,} records, {dupes} duplicates')
              assert dupes == 0, f'{fname} has duplicates!'
              assert len(ids) >= min_expected, f'{fname} has only {len(ids):,} records — expected at least {min_expected:,}. Aborting to prevent data loss.'
          print('All clean — record counts verified')
          "

      # ── PUSH RAW DATA ONLY ──
      # Only pushes data/federal_2026/ (raw receipts + expenditures).
      # Never touches viz/data/clean/, HTML, candidate_status, or display names.
      # The daily pipeline handles R aggregation into clean CSVs.
      - name: Push raw FEC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/federal_2026/
          if git diff --staged --quiet; then
            echo "No new FEC records"
          else
            git commit -m "Weekly FEC raw data: $(date +%Y-%m-%d)"
            git push
          fi
